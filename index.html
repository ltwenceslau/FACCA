  </style>
</head>
<body>
<header>
  <div><h1>Sistema FacÃ§Ã£o</h1><small>OperaÃ§Ã£o, estoque, financeiro, colaboradores e terceiros</small></div>
  <button class="btn danger" onclick="resetar()">Limpar dados</button>
</header>
<div class="layout"><nav id="menu"></nav><main id="app"></main></div>
<dialog id="modal"><div id="modalContent"></div></dialog>
<script>
const KEY="sistema_faccao_dados_v1";
const padrao={clientes:[],modelos:[],colaboradores:[],terceiros:[],ops:[],entregas:[],quebras:[],insumosOp:[],estoque:[],movEstoque:[],contas:[],despesas:[],baixas:[],valesClientes:[],valesColaboradores:[],pagamentosColaboradores:[],enviosTerceiros:[],retornosTerceiros:[],pagamentosTerceiros:[],acertos:[],historico:[]};
let db=JSON.parse(localStorage.getItem(KEY)||JSON.stringify(padrao)),tela="Dashboard";
const telas=["Dashboard","Cadastros","OperaÃ§Ã£o","Insumos OP","Estoque","Financeiro","Colaboradores","Terceiros","Acertos","HistÃ³rico"];
const salvar=()=>localStorage.setItem(KEY,JSON.stringify(db));
const id=l=>(db[l].reduce((m,x)=>Math.max(m,x.id),0)||0)+1;
const hoje=()=>new Date().toISOString().slice(0,10);
const dinheiro=v=>Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

function resetar(){if(confirm("Apagar todos os dados deste navegador?")){localStorage.removeItem(KEY);db=JSON.parse(JSON.stringify(padrao));render()}}
function totaisOp(opId){const op=db.ops.find(x=>x.id==opId);if(!op)return{entregue:0,quebra:0,saldo:0,valor:0};const entregue=db.entregas.filter(x=>x.opId==opId).reduce((s,x)=>s+Number(x.qtd||0),0);const quebra=db.quebras.filter(x=>x.opId==opId).reduce((s,x)=>s+Number(x.qtd||0),0);const saldo=Number(op.recebido||0)-entregue-quebra;const valor=Math.max(entregue-quebra,0)*Number(op.valorPeca||0);return{entregue,quebra,saldo,valor}}
function atualizarConta(opId){const total=totaisOp(opId).valor;let c=db.contas.find(x=>x.opId==opId);if(!c){c={id:id("contas"),opId,valor:total,status:"NÃ£o pago"};db.contas.push(c)}else c.valor=total;atualizarStatusConta(c.id)}
function saldoConta(cid){const c=db.contas.find(x=>x.id==cid);const pago=db.baixas.filter(x=>x.contaId==cid).reduce((s,x)=>s+Number(x.valor||0),0);return Number(c?.valor||0)-pago}
function atualizarStatusConta(cid){const c=db.contas.find(x=>x.id==cid);if(!c)return;const saldo=saldoConta(cid),pago=Number(c.valor||0)-saldo;c.status=saldo<=0&&c.valor>0?"Pago":pago>0?"Pago parcial":"NÃ£o pago"}
function atualizarStatusDespesa(id){const d=db.despesas.find(x=>x.id==id);const p=db.baixas.filter(x=>x.despesaId==id).reduce((s,x)=>s+Number(x.valor||0),0);d.status=p>=d.valor?"Pago":p>0?"Pago parcial":"NÃ£o pago"}
function renderMenu(){menu.innerHTML=telas.map(t=>`<button class="${t===tela?'active':''}" onclick="abrir('${t}')">${t}</button>`).join("")}
function abrir(t){tela=t;render()}
function page(t,s,b,c){app.innerHTML=`<section class="top"><div><h2>${t}</h2><p>${s||""}</p></div><div class="actions">${b||""}</div></section>${c}`}
function tabela(cols,rows){if(!rows.length)return`<div class="panel empty">Nenhum registro.</div>`;return`<div class="panel table-wrap"><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c??""}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`}
const btn=(txt,fn,cls="primary")=>`<button class="btn ${cls}" onclick="${fn}">${txt}</button>`;
const opts=(l,label="nome")=>db[l].map(x=>`<option value="${x.id}">${x[label]}</option>`).join("");
function abrirForm(titulo,campos,save){modalContent.innerHTML=`<h2>${titulo}</h2><form id="f">${campos.map(c=>c.type==="select"?`<label class="${c.full?'full':''}">${c.label}<select name="${c.name}">${c.options}</select></label>`:c.type==="textarea"?`<label class="${c.full?'full':''}">${c.label}<textarea name="${c.name}">${c.value||""}</textarea></label>`:`<label class="${c.full?'full':''}">${c.label}<input type="${c.type||"text"}" name="${c.name}" value="${c.value||""}"></label>`).join("")}<div class="form-actions"><button type="button" class="btn" onclick="modal.close()">Cancelar</button><button class="btn primary">Salvar</button></div></form>`;f.onsubmit=e=>{e.preventDefault();save(Object.fromEntries(new FormData(f).entries()));salvar();modal.close();render()};modal.showModal()}
function render(){renderMenu();({Dashboard:renderDashboard,Cadastros:renderCadastros,"OperaÃ§Ã£o":renderOperacao,"Insumos OP":renderInsumosOp,Estoque:renderEstoque,Financeiro:renderFinanceiro,Colaboradores:renderColaboradores,Terceiros:renderTerceiros,Acertos:renderAcertos,"HistÃ³rico":renderHistorico}[tela])()}
function renderDashboard(){const receber=db.contas.filter(x=>x.status!=="Pago").reduce((s,x)=>s+saldoConta(x.id),0),pagar=db.despesas.filter(x=>x.status!=="Pago").reduce((s,x)=>s+Number(x.valor||0),0),pend=db.insumosOp.filter(x=>x.bloqueia&&!x.resolvida).length;const cards=`<section class="grid"><div class="card"><span>OPs</span><strong>${db.ops.length}</strong></div><div class="card"><span>A receber</span><strong>${dinheiro(receber)}</strong></div><div class="card"><span>A pagar</span><strong>${dinheiro(pagar)}</strong></div><div class="card"><span>PendÃªncias</span><strong>${pend}</strong></div></section>`;const rows=db.ops.slice().reverse().map(op=>{const t=totaisOp(op.id);return[op.codigo,nome("clientes",op.clienteId),nome("modelos",op.modeloId),`<span class="pill">${op.status}</span>`,t.entregue,t.quebra,t.saldo,dinheiro(t.valor)]});page("Dashboard","Resumo geral","",cards+tabela(["OP","Cliente","Modelo","Status","Entregue","Quebra","Saldo","Valor"],rows))}
function renderCadastros(){const b=btn("Novo cliente","formCliente()")+btn("Novo modelo","formModelo()")+btn("Novo colaborador","formColaborador()")+btn("Novo terceiro","formTerceiro()");const rows=[...db.clientes.map(x=>["Cliente",x.nome,x.telefone,x.status]),...db.modelos.map(x=>["Modelo",x.nome,dinheiro(x.valorCliente),x.status]),...db.colaboradores.map(x=>["Colaborador",x.nome,x.telefone,x.status]),...db.terceiros.map(x=>["Terceiro",x.nome,x.telefone,x.status])];page("Cadastros","Bases do sistema",b,tabela(["Tipo","Nome","Telefone/Valor","Status"],rows))}
function formCliente(){abrirForm("Novo cliente",[{label:"Nome",name:"nome"},{label:"Telefone",name:"telefone"},{label:"Status",name:"status",type:"select",options:"<option>Ativo</option><option>Inativo</option>"},{label:"ObservaÃ§Ã£o",name:"obs",type:"textarea",full:true}],d=>{db.clientes.push({id:id("clientes"),nome:d.nome,telefone:d.telefone,status:d.status,obs:d.obs});hist("Cadastros","Cliente cadastrado",d.nome)})}

function formTerceiro(){abrirForm("Novo terceiro",[{label:"Nome",name:"nome"},{label:"Telefone",name:"telefone"},{label:"Status",name:"status",type:"select",options:"<option>Ativo</option><option>Inativo</option>"},{label:"ObservaÃ§Ã£o",name:"obs",type:"textarea",full:true}],d=>{db.terceiros.push({id:id("terceiros"),nome:d.nome,telefone:d.telefone,status:d.status,obs:d.obs});hist("Cadastros","Terceiro cadastrado",d.nome)})}
function renderOperacao(){const b=btn("Nova OP","formOp()")+btn("Registrar entrega","formEntrega()")+btn("Registrar quebra","formQuebra()")+btn("Finalizar OP","formFinalizarOp()");const rows=db.ops.slice().reverse().map(op=>{const t=totaisOp(op.id);return[op.id,op.codigo,nome("clientes",op.clienteId),nome("modelos",op.modeloId),op.recebido,t.entregue,t.quebra,t.saldo,dinheiro(t.valor),`<span class="pill">${op.status}</span>`]});page("OperaÃ§Ã£o / OPs","ProduÃ§Ã£o, entregas e quebras",b,tabela(["ID","OP","Cliente","Modelo","Recebido","Entregue","Quebra","Saldo","Valor","Status"],rows))}
function formOp(){abrirForm("Nova OP",[{label:"Cliente",name:"clienteId",type:"select",options:opts("clientes")},{label:"Modelo",name:"modeloId",type:"select",options:opts("modelos")},{label:"Quantidade recebida",name:"recebido",type:"number"},{label:"Grade",name:"grade"},{label:"Entrada",name:"entrada",type:"date",value:hoje()},{label:"Prazo",name:"prazo",type:"date",value:hoje()},{label:"Valor por peÃ§a",name:"valorPeca",type:"number"},{label:"ObservaÃ§Ã£o",name:"obs",type:"textarea",full:true}],d=>{const m=db.modelos.find(x=>x.id==d.modeloId),codigo=`OP-${String(id("ops")).padStart(5,"0")}`,valor=Number(d.valorPeca||0)||Number(m?.valorCliente||0);db.ops.push({id:id("ops"),codigo,clienteId:Number(d.clienteId),modeloId:Number(d.modeloId),recebido:Number(d.recebido||0),grade:d.grade,entrada:d.entrada,prazo:d.prazo,valorPeca:valor,status:"Recebida",obs:d.obs});hist("OperaÃ§Ã£o","OP criada",codigo)})}
function formEntrega(){abrirForm("Registrar entrega",[{label:"OP",name:"opId",type:"select",options:opts("ops","codigo")},{label:"Data",name:"data",type:"date",value:hoje()},{label:"Quantidade",name:"qtd",type:"number"},{label:"ObservaÃ§Ã£o",name:"obs",type:"textarea",full:true}],d=>{db.entregas.push({id:id("entregas"),opId:Number(d.opId),data:d.data,qtd:Number(d.qtd||0),obs:d.obs});const op=db.ops.find(x=>x.id==d.opId),t=totaisOp(op.id);op.status=t.saldo<=0?"Entregue":"Entregue parcial";atualizarConta(op.id);hist("OperaÃ§Ã£o","Entrega registrada",`${op.codigo} - ${d.qtd}`)})}
function formQuebra(){abrirForm("Registrar quebra",[{label:"OP",name:"opId",type:"select",options:opts("ops","codigo")},{label:"Data",name:"data",type:"date",value:hoje()},{label:"Quantidade",name:"qtd",type:"number"},{label:"Motivo",name:"motivo"},{label:"ObservaÃ§Ã£o",name:"obs",type:"textarea",full:true}],d=>{db.quebras.push({id:id("quebras"),opId:Number(d.opId),data:d.data,qtd:Number(d.qtd||0),motivo:d.motivo,obs:d.obs});atualizarConta(Number(d.opId));hist("OperaÃ§Ã£o","Quebra registrada",d.qtd)})}
function formFinalizarOp(){abrirForm("Finalizar OP",[{label:"OP",name:"opId",type:"select",options:opts("ops","codigo")},{label:"ObservaÃ§Ã£o final",name:"obs",type:"textarea",full:true}],d=>{const pend=db.insumosOp.some(x=>x.opId==d.opId&&x.bloqueia&&!x.resolvida);if(pend){alert("Existe insumo da OP com pendÃªncia bloqueante.");return}const op=db.ops.find(x=>x.id==d.opId);op.status="Finalizada";op.obs=(op.obs||"")+"\nFechamento: "+d.obs;atualizarConta(op.id);hist("OperaÃ§Ã£o","OP finalizada",op.codigo)})}

function renderEstoque(){const rows=db.estoque.map(x=>[x.nome,x.codigo,x.cor,x.qtd,x.unidade,x.obs]);page("Estoque interno","Controle manual",btn("Novo insumo","formEstoque()")+btn("Entrada / retirada","formMovEstoque()"),tabela(["Material","CÃ³digo","Cor","Quantidade","Unidade","Obs"],rows))}

function formBaixa(){const c=db.contas.map(x=>`<option value="C-${x.id}">Conta ${opCodigo(x.opId)}</option>`).join(""),des=db.despesas.map(x=>`<option value="D-${x.id}">Despesa ${x.descricao}</option>`).join("");abrirForm("Nova baixa",[{label:"Conta ou despesa",name:"alvo",type:"select",options:c+des},{label:"Data",name:"data",type:"date",value:hoje()},{label:"Valor",name:"valor",type:"number"},{label:"ObservaÃ§Ã£o",name:"obs",type:"textarea",full:true}],d=>{const[t,i]=d.alvo.split("-"),valor=Number(d.valor||0);if(t==="C"){db.baixas.push({id:id("baixas"),tipo:"Recebimento",contaId:Number(i),data:d.data,valor,obs:d.obs});atualizarStatusConta(Number(i))}else{db.baixas.push({id:id("baixas"),tipo:"Pagamento",despesaId:Number(i),data:d.data,valor,obs:d.obs});atualizarStatusDespesa(Number(i))}hist("Financeiro","Baixa lanÃ§ada",dinheiro(valor))})}
