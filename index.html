<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistema Facção</title>
  <style>
    :root{
      color-scheme:dark;
      --bg:#050505;--panel:#1b1b1b;--panel-2:#232323;--text:#f7f7f7;--muted:#a7adba;
      --line:#353535;--soft:#2f2f2f;--brand:#ffffff;--blue:#216ff5;--green:#07854f;
      --red:#d7332f;--purple:#a100ff;--field:#080808;--shadow:#0008;
    }
    body.light{
      color-scheme:light;
      --bg:#f3f5f7;--panel:#ffffff;--panel-2:#eef2f6;--text:#17202a;--muted:#667085;
      --line:#d8dee8;--soft:#e8edf3;--brand:#111827;--blue:#1769aa;--green:#168351;
      --red:#b42318;--purple:#7c3aed;--field:#ffffff;--shadow:#0002;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;font-size:14px}
    button,input,select,textarea{font:inherit}
    .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
    aside{background:var(--panel);border-right:1px solid var(--line);padding:14px 10px;position:sticky;top:0;height:100vh}
    .brand{display:flex;align-items:center;gap:10px;height:42px;margin-bottom:12px;font-weight:800;font-size:17px}
    .brand-icon{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;background:var(--brand);color:var(--bg);font-weight:900}
    .nav button{width:100%;display:flex;align-items:center;gap:10px;border:0;background:transparent;color:var(--text);padding:10px 12px;margin:4px 0;border-radius:14px;cursor:pointer;font-weight:700;text-align:left}
    .nav button:hover,.nav button.active{background:var(--soft)}
    .nav .ico{width:20px;text-align:center;opacity:.9}
    .main{min-width:0}
    header{height:56px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:var(--bg);position:sticky;top:0;z-index:5}
    .crumb{font-weight:700;color:var(--text)}
    .head-actions{display:flex;align-items:center;gap:12px}
    .theme{border:0;background:transparent;color:var(--text);cursor:pointer;font-size:18px}
    .avatar{width:34px;height:34px;border-radius:50%;background:var(--brand);color:var(--bg);display:grid;place-items:center;font-weight:800}
    main{padding:28px 54px 42px}
    .page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:26px}
    h1{font-size:25px;margin:0 0 4px;color:var(--text)}
    p{margin:0;color:var(--muted);font-size:16px}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{height:36px;border-radius:18px;border:1px solid var(--line);background:var(--field);color:var(--text);padding:0 16px;cursor:pointer;font-weight:800;display:inline-flex;align-items:center;gap:9px}
    .btn.primary{background:var(--brand);color:var(--bg);border-color:var(--brand)}
    .btn.soft{background:var(--soft);border-color:var(--soft)}
    .btn.danger{background:var(--red);border-color:var(--red);color:white}
    .tabs{display:inline-flex;background:var(--soft);border-radius:18px;padding:3px;margin-bottom:22px}
    .tabs button{border:0;border-radius:15px;background:transparent;color:var(--muted);height:28px;padding:0 14px;font-weight:800;cursor:pointer}
    .tabs button.active{background:var(--bg);color:var(--text)}
    .filters{display:grid;grid-template-columns:1.3fr 170px 170px 170px 1fr;gap:10px;align-items:center;margin-bottom:16px}
    .field{height:36px;border:1px solid var(--line);background:var(--field);color:var(--text);border-radius:18px;padding:0 12px;outline:none}
    .search-wrap{position:relative}
    .search-wrap span{position:absolute;left:12px;top:8px;color:var(--muted)}
    .search-wrap input{padding-left:34px;width:100%}
    .table-card{border:1px solid var(--line);border-radius:14px;background:var(--panel);overflow:hidden;box-shadow:0 16px 40px var(--shadow)}
    .table-wrap{overflow:auto;max-height:calc(100vh - 260px)}
    table{border-collapse:collapse;width:100%;min-width:1120px}
    th,td{border-bottom:1px solid var(--line);padding:11px 9px;text-align:left;vertical-align:middle}
    th{color:var(--muted);font-weight:800;background:var(--panel);position:sticky;top:0;z-index:1}
    td{font-weight:700}
    .sub{display:block;color:var(--muted);font-size:10px;margin-top:2px;font-weight:600}
    .num{font-variant-numeric:tabular-nums}
    .chip{display:inline-flex;align-items:center;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:900;background:var(--soft);color:var(--text);white-space:nowrap}
    .chip.blue{background:var(--blue);color:#fff}.chip.green{background:var(--green);color:#001b10}.chip.purple{background:var(--purple);color:#fff}.chip.red{background:var(--red);color:#fff}
    .row-actions{display:flex;gap:12px;color:var(--text);opacity:.95}
    .empty{padding:32px;color:var(--muted);font-size:16px}
    .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px}
    .card span{display:block;color:var(--muted);margin-bottom:8px}.card strong{font-size:25px}
    dialog{border:1px solid var(--line);border-radius:16px;background:var(--panel);color:var(--text);box-shadow:0 20px 70px #000b;width:min(720px,94vw)}
    dialog::backdrop{background:#000b}
    form{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    label{font-weight:800;color:var(--text);font-size:13px}
    label.full{grid-column:1/-1}
    input,select,textarea{width:100%;margin-top:6px;border:1px solid var(--line);background:var(--field);color:var(--text);border-radius:10px;padding:10px;outline:none}
    textarea{min-height:86px}
    .form-actions{grid-column:1/-1;display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
    @media(max-width:980px){
      .app{grid-template-columns:1fr}aside{position:static;height:auto}.nav{display:flex;overflow:auto}.nav button{min-width:max-content}
      main{padding:18px}.page-head{flex-direction:column}.filters{grid-template-columns:1fr 1fr}.cards{grid-template-columns:1fr 1fr}
    }
    @media(max-width:640px){.filters,.cards{grid-template-columns:1fr}.actions{width:100%}.btn{justify-content:center}}
  </style>
</head>
<body>
<div class="app">
  <aside>
    <div class="brand"><span class="brand-icon">M</span><span>Produção</span></div>
    <div class="nav" id="menu"></div>
  </aside>
  <section class="main">
    <header>
      <div class="crumb" id="crumb">Produção</div>
      <div class="head-actions">
        <button class="theme" onclick="toggleTheme()" title="Alternar tema">☾</button>
        <div class="avatar">US</div>
      </div>
    </header>
    <main id="app"></main>
  </section>
</div>
<dialog id="modal"><div id="modalContent"></div></dialog>

<script>
const KEY="sistema_faccao_v2";
const THEME="sistema_faccao_tema";
const seedOps=[
  {id:1,codigo:"183",tipo:"Estoque",modelo:"TSHIRT TRADICIONAL",ref:"TSHIRT-TRAD",parceiro:"LEONARDO DORNELES COSTA DA SILVA LTDA",qtd:1650,status:"Enviada",lanc:"Não lançado",data:"01/05/2026",partida:"-"},
  {id:2,codigo:"182",tipo:"Estoque",modelo:"MOLETOM TRADICIONAL RAGLAN",ref:"MOLE-TRAD",parceiro:"-",qtd:2232,status:"Criada",lanc:"Não lançado",data:"01/05/2026",partida:"-"},
  {id:3,codigo:"177",tipo:"Estoque",modelo:"TSHIRT INFANTIL",ref:"TSH-INF",parceiro:"-",qtd:1548,status:"Criada",lanc:"Não lançado",data:"30/04/2026",partida:"-"},
  {id:4,codigo:"179",tipo:"Estoque",modelo:"CAMISETA OVER",ref:"CAMIS-OVER",parceiro:"LEONARDO DORNELES COSTA DA SILVA LTDA",qtd:2200,status:"Enviada",lanc:"Não lançado",data:"30/04/2026",partida:"-"},
  {id:5,codigo:"172",tipo:"Estoque",modelo:"TSHIRT TRADICIONAL",ref:"TSHIRT-TRAD",parceiro:"LEONARDO DORNELES COSTA DA SILVA LTDA",qtd:4360,status:"Enviada",lanc:"Não lançado",data:"30/04/2026",partida:"-"},
  {id:6,codigo:"171",tipo:"Estoque",modelo:"TSHIRT LISTRADA CONFORT",ref:"TSH-CONFORT-LISTR-ETNA",parceiro:"LEONARDO DORNELES COSTA DA SILVA LTDA",qtd:572,status:"Recebida",lanc:"Cross-Docking",data:"28/04/2026",partida:"-"}
];
const vazio={ops:[...seedOps],solicitacoes:[],clientes:[],modelos:[],terceiros:[],financeiro:[],estoque:[],historico:[]};
let db=JSON.parse(localStorage.getItem(KEY)||JSON.stringify(vazio));
let tela="Produção";
let tabProd="Ordens de Produção";
let filtro="";
let tema=localStorage.getItem(THEME)||"dark";
const telas=[["Dashboard","▦"],["Produção","▣"],["Artigos","▱"],["Cadastros","▤"],["Financeiro","▣"],["Relatórios","▥"],["Configurações","⚙"]];

function save(){localStorage.setItem(KEY,JSON.stringify(db))}
function nextId(list){return (db[list].reduce((m,x)=>Math.max(m,x.id||0),0)||0)+1}
function money(v){return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function fmtQtd(v){return Number(v||0).toLocaleString("pt-BR")}
function setTheme(){document.body.classList.toggle("light",tema==="light");document.querySelector(".theme").textContent=tema==="light"?"☀":"☾";localStorage.setItem(THEME,tema)}
function toggleTheme(){tema=tema==="dark"?"light":"dark";setTheme()}
function openTela(t){tela=t;render()}
function renderMenu(){menu.innerHTML=telas.map(([t,i])=>`<button class="${tela===t?'active':''}" onclick="openTela('${t}')"><span class="ico">${i}</span>${t}</button>`).join("")}
function page(title,sub,actions,body){crumb.textContent=title;app.innerHTML=`<section class="page-head"><div><h1>${title}</h1><p>${sub||""}</p></div><div class="actions">${actions||""}</div></section>${body}`}
function btn(text,fn,cls="soft"){return `<button class="btn ${cls}" onclick="${fn}"><span>＋</span>${text}</button>`}
function table(cols,rows){if(!rows.length)return`<div class="table-card"><div class="empty">Nenhum registro encontrado.</div></div>`;return`<div class="table-card"><div class="table-wrap"><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c??""}</td>`).join("")}</tr>`).join("")}</tbody></table></div></div>`}
function chip(text){let c=text==="Enviada"?"blue":text==="Recebida"?"green":text==="Cross-Docking"?"purple":text==="Cancelada"?"red":"";return `<span class="chip ${c}">${text}</span>`}
function actions(){return `<div class="row-actions"><span title="Visualizar">◉</span><span title="Conferir">▣</span><span title="Imprimir">▤</span><span style="color:var(--red)" title="Excluir">⌫</span></div>`}
function render(){
  setTheme();renderMenu();
  if(tela==="Produção") return renderProducao();
  if(tela==="Dashboard") return renderDashboard();
  if(tela==="Cadastros") return renderCadastro();
  if(tela==="Financeiro") return renderSimples("Financeiro","Contas, pagamentos e acertos",["Tipo","Descrição","Valor","Status"],db.financeiro.map(x=>[x.tipo,x.descricao,money(x.valor),chip(x.status||"Aberto")]),btn("Novo Lançamento","formFinanceiro()","primary"));
  if(tela==="Artigos") return renderSimples("Artigos","Modelos e peças cadastradas",["Modelo","Referência","Valor Cliente"],db.modelos.map(x=>[x.nome,x.ref||"-",money(x.valor||0)]),btn("Novo Artigo","formModelo()","primary"));
  if(tela==="Relatórios") return renderRelatorios();
  if(tela==="Configurações") return page("Configurações","Preferências do sistema","",`<div class="cards"><div class="card"><span>Tema atual</span><strong>${tema==="dark"?"Escuro":"Claro"}</strong></div><div class="card"><span>Registros salvos</span><strong>${db.ops.length}</strong></div></div><button class="btn primary" onclick="toggleTheme()">Alternar tema</button>`);
}
function renderDashboard(){
  const total=db.ops.reduce((s,x)=>s+Number(x.qtd||0),0);
  const cards=`<div class="cards"><div class="card"><span>OPs listadas</span><strong>${db.ops.length}</strong></div><div class="card"><span>Peças</span><strong>${fmtQtd(total)}</strong></div><div class="card"><span>Enviadas</span><strong>${db.ops.filter(x=>x.status==="Enviada").length}</strong></div><div class="card"><span>Recebidas</span><strong>${db.ops.filter(x=>x.status==="Recebida").length}</strong></div></div>`;
  page("Dashboard","Resumo rápido da produção","",cards);
}
function renderProducao(){
  const a=`<button class="btn" onclick="alert('Planejador será implementado na próxima etapa')">▦ Planejador</button>${btn("OP Avulsa","formOP()","primary")}${btn("Nova Solicitação","formSolicitacao()","soft")}`;
  const tabs=`<div class="tabs"><button class="${tabProd==='Ordens de Produção'?'active':''}" onclick="tabProd='Ordens de Produção';render()">Ordens de Produção</button><button class="${tabProd==='Solicitações'?'active':''}" onclick="tabProd='Solicitações';render()">Solicitações</button></div>`;
  const filtros=`<div class="filters"><div class="search-wrap"><span>⌕</span><input class="field" id="busca" value="${filtro}" oninput="filtro=this.value;renderProducaoTabela()" placeholder="Buscar por número, produto, terceiro..."></div><select class="field" id="st" onchange="renderProducaoTabela()"><option>Status OP</option><option>Enviada</option><option>Criada</option><option>Recebida</option></select><select class="field"><option>Lançamento</option><option>Não lançado</option><option>Cross-Docking</option></select><select class="field"><option>Tipo Ordem</option><option>Estoque</option></select><input class="field" placeholder="Partida..."></div>`;
  page("Produção","Gerencie ordens de produção e solicitações",a,tabs+filtros+`<div id="prodTable"></div>`);
  renderProducaoTabela();
}
function renderProducaoTabela(){
  if(tabProd==="Solicitações"){prodTable.innerHTML=table(["Nº","Solicitação","Cliente","Data","Status","Ações"],db.solicitacoes.map(x=>[x.id,x.nome,x.cliente,x.data,chip(x.status),actions()]));return}
  const termo=(document.getElementById("busca")?.value||filtro||"").toLowerCase();
  const st=document.getElementById("st")?.value||"Status OP";
  let rows=db.ops.filter(o=>{
    const texto=[o.codigo,o.modelo,o.ref,o.parceiro,o.status,o.lanc,o.data,o.tipo].join(" ").toLowerCase();
    return (!termo||texto.includes(termo)) && (st==="Status OP"||o.status===st);
  }).map(o=>[o.codigo,chip(o.tipo),`<strong>${o.modelo}</strong><span class="sub">${o.ref||"-"}</span>`,o.parceiro||"-",`<span class="num">${fmtQtd(o.qtd)}</span>`,chip(o.status),chip(o.lanc||"Não lançado"),o.data||"-",o.partida||"-",actions()]);
  prodTable.innerHTML=table(["Nº","Tipo","Modelo","Parceiro","Qtd","Status","Lanç.","Data","Partida","Ações"],rows);
}
function renderCadastro(){
  const a=btn("Cliente","formCliente()","primary")+btn("Modelo","formModelo()","soft")+btn("Terceiro","formTerceiro()","soft");
  const rows=[...db.clientes.map(x=>["Cliente",x.nome,x.telefone||"-"]),...db.modelos.map(x=>["Modelo",x.nome,x.ref||"-"]),...db.terceiros.map(x=>["Terceiro",x.nome,x.telefone||"-"])];
  renderSimples("Cadastros","Clientes, artigos e parceiros",["Tipo","Nome","Detalhe"],rows,a);
}
function renderSimples(title,sub,cols,rows,actions=""){page(title,sub,actions,table(cols,rows))}
function renderRelatorios(){renderSimples("Relatórios","Visão simples dos registros",["Indicador","Total"],[["OPs",db.ops.length],["Clientes",db.clientes.length],["Terceiros",db.terceiros.length],["Lançamentos financeiros",db.financeiro.length]])}
function modalForm(title,fields,saveFn){
  modalContent.innerHTML=`<h1>${title}</h1><form id="frm">${fields.map(f=>f.type==="select"?`<label>${f.label}<select name="${f.name}">${f.options}</select></label>`:f.type==="textarea"?`<label class="full">${f.label}<textarea name="${f.name}">${f.value||""}</textarea></label>`:`<label>${f.label}<input name="${f.name}" type="${f.type||"text"}" value="${f.value||""}"></label>`).join("")}<div class="form-actions"><button type="button" class="btn" onclick="modal.close()">Cancelar</button><button class="btn primary">Salvar</button></div></form>`;
  frm.onsubmit=e=>{e.preventDefault();saveFn(Object.fromEntries(new FormData(frm).entries()));save();modal.close();render()};modal.showModal();
}
function options(list,label="nome"){return db[list].map(x=>`<option value="${x.id}">${x[label]}</option>`).join("")}
function formOP(){modalForm("Nova OP Avulsa",[{label:"Modelo",name:"modelo"},{label:"Referência",name:"ref"},{label:"Parceiro",name:"parceiro",value:"-"},{label:"Quantidade",name:"qtd",type:"number"},{label:"Status",name:"status",type:"select",options:"<option>Criada</option><option>Enviada</option><option>Recebida</option>"},{label:"Data",name:"data",type:"date",value:new Date().toISOString().slice(0,10)}],d=>{db.ops.unshift({id:nextId("ops"),codigo:String(100+nextId("ops")),tipo:"Estoque",modelo:d.modelo.toUpperCase(),ref:d.ref,parceiro:d.parceiro,qtd:Number(d.qtd||0),status:d.status,lanc:"Não lançado",data:d.data.split("-").reverse().join("/"),partida:"-"})})}
function formSolicitacao(){modalForm("Nova Solicitação",[{label:"Nome",name:"nome"},{label:"Cliente",name:"cliente"},{label:"Data",name:"data",type:"date",value:new Date().toISOString().slice(0,10)},{label:"Status",name:"status",type:"select",options:"<option>Criada</option><option>Enviada</option>"}],d=>db.solicitacoes.unshift({id:nextId("solicitacoes"),...d,data:d.data.split("-").reverse().join("/")}))}
function formCliente(){modalForm("Novo Cliente",[{label:"Nome",name:"nome"},{label:"Telefone",name:"telefone"}],d=>db.clientes.push({id:nextId("clientes"),...d}))}
function formModelo(){modalForm("Novo Artigo",[{label:"Modelo",name:"nome"},{label:"Referência",name:"ref"},{label:"Valor",name:"valor",type:"number"}],d=>db.modelos.push({id:nextId("modelos"),...d,valor:Number(d.valor||0)}))}
function formTerceiro(){modalForm("Novo Terceiro",[{label:"Nome",name:"nome"},{label:"Telefone",name:"telefone"}],d=>db.terceiros.push({id:nextId("terceiros"),...d}))}
function formFinanceiro(){modalForm("Novo Lançamento",[{label:"Tipo",name:"tipo",type:"select",options:"<option>Receita</option><option>Despesa</option>"},{label:"Descrição",name:"descricao"},{label:"Valor",name:"valor",type:"number"},{label:"Status",name:"status",type:"select",options:"<option>Aberto</option><option>Pago</option>"}],d=>db.financeiro.push({id:nextId("financeiro"),...d,valor:Number(d.valor||0)}))}
render();
</script>
</body>
</html>
